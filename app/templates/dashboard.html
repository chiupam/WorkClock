<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/database.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>考勤日志</h1>
            <div class="header-buttons">
                <button onclick="window.location.href=`{{ url_for('main.admin_db') }}`" class="nav-button">数据库</button>
                <button onclick="window.location.href=`{{ url_for('main.admin_operation') }}`" class="nav-button">操作日志</button>
                <button onclick="window.location.href=`{{ url_for('main.admin_super') }}`" class="nav-button">超级打卡</button>
                <button onclick="window.location.href=`{{ url_for('main.admin_logout') }}`" class="logout-button">退出登录</button>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>用户名</th>
                        <th>部门</th>
                        <th>类型</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.sign_time }}</td>
                        <td>{{ log.user_name }} ({{ log.user_id }})</td>
                        <td>{{ log.dep_name }} ({{ log.dep_id }})</td>
                        <td>{{ log.sign_type }}</td>
                        <td>{{ log.sign_result }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
